<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深中国攻击态势</title>
  <link href="../component/pear/css/pear.css" rel="stylesheet">
  <style>
    :root {
      --bg-0: #030b27;
      --bg-1: #07153f;
      --bg-2: #0e2b73;
      --text-main: #d9efff;
      --text-soft: #7cb8df;
      --cyan: #2fe0ff;
      --red: #ff4f73;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DIN Alternate", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 18% 14%, rgba(35, 105, 255, .22) 0, rgba(35, 105, 255, 0) 36%),
        radial-gradient(circle at 82% 22%, rgba(27, 227, 255, .14) 0, rgba(27, 227, 255, 0) 30%),
        linear-gradient(165deg, var(--bg-0), var(--bg-1) 52%, #081d56);
      overflow: hidden;
    }

    .screen {
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      grid-template-rows: 74px 1fr 170px;
      grid-template-areas:
        "head head head"
        "left map right"
        "foot foot foot";
      height: 100%;
      gap: 12px;
      padding: 12px;
      background-image:
        linear-gradient(rgba(55, 146, 224, .06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(55, 146, 224, .06) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .panel {
      border: 1px solid rgba(74, 152, 224, .32);
      background: linear-gradient(180deg, rgba(7, 31, 78, .78), rgba(3, 15, 47, .9));
      box-shadow: inset 0 0 36px rgba(36, 145, 255, .12), 0 10px 36px rgba(0, 0, 0, .32);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-top: 2px solid rgba(63, 205, 255, .24);
    }

    .head {
      grid-area: head;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
      font-weight: 700;
      text-shadow: 0 0 14px rgba(54, 182, 255, .35);
    }
    .title-wrap p {
      margin: 2px 0 0;
      color: var(--text-soft);
      letter-spacing: 2px;
      font-size: 13px;
      text-transform: uppercase;
    }
    .head-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bbdefc;
      font-size: 13px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .badge {
      border: 1px solid rgba(96, 201, 255, .35);
      background: rgba(8, 40, 93, .7);
      border-radius: 18px;
      padding: 4px 10px;
    }
    .screen-btn {
      border: 1px solid rgba(96, 201, 255, .45);
      background: rgba(15, 74, 140, .66);
      color: #d9efff;
      border-radius: 18px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .screen-btn:hover {
      background: rgba(21, 100, 188, .82);
      border-color: rgba(107, 213, 255, .8);
    }

    .left { grid-area: left; padding: 14px; }
    .right { grid-area: right; padding: 14px; }
    .map { grid-area: map; position: relative; padding: 0; }
    .foot {
      grid-area: foot;
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 12px;
    }
    .foot-stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
    }

    .block-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .6px;
      margin: 0 0 10px;
      color: #d9f2ff;
    }
    .big-number {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }
    .big-number .v {
      font-size: 48px;
      line-height: 1;
      color: var(--cyan);
      text-shadow: 0 0 16px rgba(47, 224, 255, .45);
      font-family: "DIN Alternate", "Consolas", monospace;
      font-weight: 700;
    }
    .big-number .u { color: #90c7ec; font-size: 14px; }
    .rank-list { display: flex; flex-direction: column; gap: 9px; margin-bottom: 14px; min-height: 160px; }
    .rank-item { display: grid; grid-template-columns: 80px 1fr 64px; gap: 8px; align-items: center; font-size: 12px; }
    .bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(64, 119, 171, .45);
      overflow: hidden;
    }
    .bar > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #1fd0ff, #3fe89b);
    }

    .linebox {
      border: 1px solid rgba(103, 174, 235, .28);
      border-radius: 10px;
      padding: 8px;
      background: rgba(7, 33, 84, .48);
    }
    .linebox canvas { width: 100%; height: 120px; display: block; }

    .world {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 1px solid rgba(78, 163, 235, .32);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(40, 106, 230, .2), rgba(6, 24, 71, .9) 70%),
        linear-gradient(180deg, rgba(6, 25, 70, .7), rgba(2, 13, 43, .94));
    }
    #chinaMap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    #attackOverlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
      overflow: visible;
    }
    .attack-arc {
      fill: none;
      stroke: rgba(255, 64, 96, .95);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-dasharray: 8 8;
      animation: attack-dash 1.2s linear infinite;
      filter: drop-shadow(0 0 4px rgba(255, 64, 96, .65));
    }
    .attack-dot {
      fill: #ff4f73;
      filter: drop-shadow(0 0 6px rgba(255, 64, 96, .9));
      animation: attack-pulse 1.4s ease-in-out infinite;
    }
    .attack-label {
      fill: #9ad8ff;
      font-size: 11px;
      paint-order: stroke;
      stroke: rgba(3, 11, 39, .9);
      stroke-width: 2px;
      stroke-linejoin: round;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    @keyframes attack-dash { to { stroke-dashoffset: -16; } }
    @keyframes attack-pulse {
      0%,100% { r: 3.5; opacity: .9; }
      50% { r: 6; opacity: 1; }
    }

    .legend {
      position: absolute;
      right: 14px;
      bottom: 10px;
      display: flex;
      gap: 14px;
      font-size: 12px;
      color: #97c9e9;
      z-index: 6;
    }
    .legend i {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: -1px;
    }
    .lg-traffic i { background: #2fe0ff; }
    .lg-attack i { background: #ff4f73; }

    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: calc(100% - 36px);
      overflow: auto;
      padding-right: 4px;
    }
    .alert-item {
      border: 1px solid rgba(120, 191, 240, .34);
      border-left: 4px solid #ffad42;
      border-radius: 6px;
      background: rgba(8, 33, 84, .56);
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.3;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      align-items: center;
      column-gap: 8px;
    }
    .alert-item .ip { color: #e6f5ff; font-size: 12px; font-weight: 700; }
    .alert-item .m { color: #9eccec; font-size: 11px; white-space: nowrap; }

    .mini {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 74px;
    }
    .mini .t { color: #88c0e8; font-size: 13px; margin-bottom: 8px; }
    .mini .n {
      font-size: 30px;
      line-height: 1.1;
      font-family: "DIN Alternate", "Consolas", monospace;
      color: #d8f2ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini .n.red { color: #ffc0cf; }
    #ruleVersion {
      font-size: 24px;
      line-height: 1.2;
      white-space: normal;
      word-break: break-all;
      overflow: visible;
      text-overflow: initial;
    }

    @media (max-width: 1440px) {
      .screen { grid-template-columns: 280px 1fr 280px; }
      .foot { grid-template-columns: 280px 1fr 280px; }
      .title-wrap h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="head panel">
      <div class="title-wrap">
        <h1>中国网络安全感知大数据</h1>
        <p>中国网络安全感知大数据</p>
      </div>
      <div class="head-info">
        <span id="nowTime">--</span>
        <span class="badge">数据源: /screen/global/data</span>
        <span class="badge">在线节点: <b id="nodeCount">0</b></span>
        <button id="btnSwitchTheme" class="screen-btn" type="button">切换浅色</button>
        <button id="btnGenerateUrl" class="screen-btn" type="button">URL生成</button>
        <button id="btnFullscreen" class="screen-btn" type="button">全屏</button>
      </div>
    </div>

    <aside class="left panel">
      <h3 class="block-title">攻击源排行（30天）</h3>
      <div class="big-number">
        <span class="v" id="attackTotal">0</span>
        <span class="u">次</span>
      </div>
      <div class="rank-list" id="rankList"></div>

      <h3 class="block-title">流量趋势（24h）</h3>
      <div class="linebox"><canvas id="trendCanvas" width="300" height="120"></canvas></div>
    </aside>

    <main class="map panel">
      <div class="world">
        <div id="chinaMap"></div>
        <svg id="attackOverlay" viewBox="0 0 1200 700" preserveAspectRatio="none"></svg>
        <div class="legend">
          <span class="lg-traffic"><i></i>访问热点</span>
          <span class="lg-attack"><i></i>攻击热点</span>
        </div>
      </div>
    </main>

    <aside class="right panel">
      <h3 class="block-title">节点攻击告警（最近30分钟）</h3>
      <div class="alert-list" id="alertList"></div>
    </aside>

    <div class="foot-stack">
      <div class="mini panel">
        <div class="t">今日请求</div>
        <div class="n" id="reqTotal">0</div>
      </div>
      <div class="mini panel">
        <div class="t">规则版本</div>
        <div class="n" id="ruleVersion">unknown</div>
      </div>
    </div>
    <div></div>
    <div class="foot-stack">
      <div class="mini panel">
        <div class="t">今日拦截</div>
        <div class="n red" id="blockTotal">0</div>
      </div>
      <div class="mini panel">
        <div class="t">今日人机验证通过</div>
        <div class="n" id="captchaPass">0</div>
      </div>
    </div>
  </div>

  <script src="../component/layui/layui.js"></script>
  <script src="../component/pear/pear.js"></script>
  <script>
    layui.use(["jquery", "popup", "echarts", "layer"], function () {
      var $ = layui.$;
      var popup = layui.popup;
      var echarts = layui.echarts;
      var layer = layui.layer;

      var params = new URLSearchParams(window.location.search || "");
      var shareToken = params.get("token") || "";
      var isShareMode = window.location.pathname === "/screen/china";
      var dataUrl = "/screen/global/data" + (shareToken ? ("?token=" + encodeURIComponent(shareToken)) : "");

      var chinaChart = echarts.init(document.getElementById("chinaMap"));
      var overlay = document.getElementById("attackOverlay");
      var chinaReady = false;
      var latestLinesData = [];
      var TARGET_COORD = [121.4737, 31.2304];
      var TARGET_NAME = "10.15.108.11 · 上海";
      var PROVINCE_COORDS = {
        "北京": [116.40, 39.90], "天津": [117.20, 39.12], "河北": [114.48, 38.03], "山西": [112.55, 37.87],
        "内蒙古": [111.73, 40.83], "辽宁": [123.43, 41.80], "吉林": [125.32, 43.90], "黑龙江": [126.63, 45.75],
        "上海": [121.47, 31.23], "江苏": [118.78, 32.04], "浙江": [120.15, 30.28], "安徽": [117.27, 31.86],
        "福建": [119.30, 26.08], "江西": [115.89, 28.68], "山东": [117.00, 36.67], "河南": [113.62, 34.75],
        "湖北": [114.30, 30.60], "湖南": [112.98, 28.20], "广东": [113.27, 23.13], "广西": [108.32, 22.82],
        "海南": [110.35, 20.02], "重庆": [106.55, 29.57], "四川": [104.07, 30.67], "贵州": [106.71, 26.57],
        "云南": [102.71, 25.04], "西藏": [91.11, 29.97], "陕西": [108.95, 34.27], "甘肃": [103.84, 36.06],
        "青海": [101.78, 36.62], "宁夏": [106.23, 38.49], "新疆": [87.62, 43.82], "香港": [114.17, 22.30],
        "澳门": [113.54, 22.19], "台湾": [121.50, 25.03], "未知": [112.93, 28.23]
      };
      var MOCK_CHINA_REGION = [
        { name_cn: "广东", attack_times: 2860 },
        { name_cn: "浙江", attack_times: 2240 },
        { name_cn: "江苏", attack_times: 1980 },
        { name_cn: "山东", attack_times: 1760 },
        { name_cn: "四川", attack_times: 1540 },
        { name_cn: "湖北", attack_times: 1330 },
        { name_cn: "福建", attack_times: 1180 },
        { name_cn: "河南", attack_times: 1060 },
        { name_cn: "北京", attack_times: 960 },
        { name_cn: "上海", attack_times: 880 },
        { name_cn: "湖南", attack_times: 760 },
        { name_cn: "重庆", attack_times: 620 }
      ];

      var state = {
        wafStatus: {},
        chinaRegion: [],
        trafficRows: [],
        nodeSummary: [],
        nodeStat: {},
        masterIp: ""
      };

      function num(v) {
        var n = Number(v);
        return isFinite(n) ? n : 0;
      }
      function fmt(v) {
        return num(v).toLocaleString();
      }
      function pad(v) {
        return String(v).padStart(2, "0");
      }
      function updateTime() {
        var d = new Date();
        $("#nowTime").text(
          d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " +
          pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds())
        );
      }
      function withMockChinaRegion(region) {
        var list = [];
        var exists = {};
        (Array.isArray(region) ? region : []).forEach(function (item) {
          var name = item && (item.name_cn || item.name_en || "");
          if (!name || exists[name]) return;
          exists[name] = true;
          list.push({
            name_cn: name,
            name_en: name,
            attack_times: num(item.attack_times)
          });
        });
        if (list.length >= 6) return list;

        MOCK_CHINA_REGION.forEach(function (item, idx) {
          if (exists[item.name_cn]) return;
          exists[item.name_cn] = true;
          list.push({
            name_cn: item.name_cn,
            name_en: item.name_cn,
            attack_times: item.attack_times
          });
        });
        return list;
      }

      function renderRank() {
        var list = (state.chinaRegion || []).slice().sort(function (a, b) {
          return num(b.attack_times) - num(a.attack_times);
        }).slice(0, 6);
        var max = list.length > 0 ? Math.max.apply(null, list.map(function (x) { return num(x.attack_times); })) : 0;

        $("#attackTotal").text(fmt((state.chinaRegion || []).reduce(function (s, x) { return s + num(x.attack_times); }, 0)));
        if (list.length === 0) {
          $("#rankList").html('<div style="color:#7cb8df;font-size:12px;padding-top:8px;">暂无省份攻击数据</div>');
          return;
        }

        var html = list.map(function (row) {
          var v = num(row.attack_times);
          var w = max > 0 ? Math.round(v / max * 100) : 0;
          return '' +
            '<div class="rank-item">' +
              '<span>' + (row.name_cn || row.name_en || "-") + '</span>' +
              '<span class="bar"><i style="width:' + Math.max(6, w) + '%"></i></span>' +
              '<span>' + fmt(v) + '</span>' +
            '</div>';
        }).join("");
        $("#rankList").html(html);
      }

      function renderTrend() {
        var canvas = document.getElementById("trendCanvas");
        var ctx = canvas.getContext("2d");
        var rows = state.trafficRows || [];
        var points = rows.map(function (r) { return num(r[2]); });
        if (points.length === 0) points = [0, 0, 0, 0];

        var maxVal = Math.max.apply(null, points.concat([1]));
        var mag = Math.pow(10, Math.floor(Math.log(maxVal) / Math.LN10));
        var yMax = Math.ceil(maxVal / mag) * mag;
        if (yMax <= 0) yMax = 1;

        var W = canvas.width;
        var H = canvas.height;
        var P = { left: 40, right: 8, top: 8, bottom: 22 };
        var plotW = W - P.left - P.right;
        var plotH = H - P.top - P.bottom;

        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = "rgba(139,190,228,.28)";
        ctx.fillStyle = "rgba(152,203,236,.9)";
        ctx.font = "11px DIN Alternate, Consolas, sans-serif";

        for (var i = 0; i <= 4; i++) {
          var v = yMax * (1 - i / 4);
          var y = P.top + plotH * (i / 4);
          ctx.beginPath();
          ctx.moveTo(P.left, y);
          ctx.lineTo(W - P.right, y);
          ctx.stroke();
          ctx.fillText(String(Math.round(v)), 4, y + 4);
        }

        ctx.beginPath();
        ctx.strokeStyle = "rgba(159,214,248,.45)";
        ctx.moveTo(P.left, P.top);
        ctx.lineTo(P.left, H - P.bottom);
        ctx.lineTo(W - P.right, H - P.bottom);
        ctx.stroke();

        var grad = ctx.createLinearGradient(0, P.top, 0, H - P.bottom);
        grad.addColorStop(0, "rgba(47,224,255,.35)");
        grad.addColorStop(1, "rgba(47,224,255,0)");

        ctx.beginPath();
        points.forEach(function (p, i) {
          var x = points.length > 1 ? P.left + i * (plotW / (points.length - 1)) : P.left;
          var y = H - P.bottom - (p / yMax) * plotH;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#44e8ff";
        ctx.stroke();
        ctx.lineTo(P.left + plotW, H - P.bottom);
        ctx.lineTo(P.left, H - P.bottom);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
      }

      function renderBottom() {
        var ws = state.wafStatus || {};
        $("#reqTotal").text(fmt(ws.request_times));
        $("#blockTotal").text(fmt(ws.block_times));
        $("#captchaPass").text(fmt(ws.captcha_pass_times));

        var version = "unknown";
        if (Array.isArray(state.nodeSummary) && state.nodeSummary.length > 0) {
          var first = state.nodeSummary.find(function (x) {
            return (x.node_ip || "") === (state.masterIp || "");
          }) || state.nodeSummary[0];
          version = first && first.rules_version ? first.rules_version : "unknown";
        }
        $("#ruleVersion").text(version);
        $("#nodeCount").text(num(state.nodeStat.online));
      }

      function renderAlerts() {
        var list = (state.nodeSummary || []).slice().sort(function (a, b) {
          return num(b.attack_count) - num(a.attack_count);
        }).slice(0, 18);

        if (list.length === 0) {
          $("#alertList").html('<div style="color:#7cb8df;font-size:12px;">暂无节点攻击数据</div>');
          return;
        }

        var html = list.map(function (n) {
          var attackCount = num(n.attack_count);
          var lvl = attackCount >= 20 ? "high" : (attackCount === 0 ? "low" : "");
          return '' +
            '<div class="alert-item ' + lvl + '">' +
              '<span class="ip">' + (n.node_ip || "-") + '</span>' +
              '<span class="m">攻击: ' + fmt(attackCount) + '</span>' +
              '<span class="m">拦截: ' + fmt(n.block_count) + '</span>' +
            '</div>';
        }).join("");
        $("#alertList").html(html);
      }

      function renderMap() {
        if (!chinaReady) return;

        var region = state.chinaRegion || [];
        var mapData = region.map(function (x) {
          return { name: x.name_cn || x.name_en || "", value: num(x.attack_times) };
        }).filter(function (x) { return x.name && x.value > 0; });

        var topList = region.slice().sort(function (a, b) { return num(b.attack_times) - num(a.attack_times); }).slice(0, 12);
        var linesData = [];
        var scatterData = [];
        topList.forEach(function (x) {
          var name = x.name_cn || x.name_en || "未知";
          var c = PROVINCE_COORDS[name];
          if (name === "内网") return;
          if (!c) return;
          linesData.push({ fromName: name, coords: [c, TARGET_COORD], value: num(x.attack_times) });
          scatterData.push({ name: name, value: [c[0], c[1], num(x.attack_times)] });
        });
        latestLinesData = linesData;

        var max = mapData.length > 0 ? Math.max.apply(null, mapData.map(function (x) { return x.value; })) : 100;
        if (max < 100) max = 100;

        chinaChart.setOption({
          tooltip: {
            trigger: "item",
            formatter: function (params) {
              var v = params.value || 0;
              if (Array.isArray(v)) v = v[2] || 0;
              return params.name + ": " + fmt(v);
            }
          },
          visualMap: {
            min: 1,
            max: max,
            show: false,
            inRange: { color: ["#0b5e8f", "#178fbc", "#29c0f9", "#ff8c69", "#ff4f73"] }
          },
          geo: {
            map: "china",
            roam: true,
            scaleLimit: { min: 1, max: 5 },
            layoutCenter: ["53%", "52%"],
            layoutSize: "128%",
            itemStyle: { areaColor: "#123f75", borderColor: "#2db7f5", borderWidth: 0.8 },
            emphasis: { itemStyle: { areaColor: "#1b5e9d" } }
          },
          series: [
            { name: "攻击热力", type: "map", map: "china", geoIndex: 0, data: mapData },
            {
              name: "攻击流向", type: "lines", coordinateSystem: "geo", zlevel: 5,
              effect: {
                show: true,
                period: 3.2,
                trailLength: 0.18,
                symbol: "arrow",
                symbolSize: 7,
                color: "#ffd166"
              },
              lineStyle: {
                color: "rgba(255, 79, 115, .88)",
                width: 2.4,
                opacity: 0.82,
                curveness: 0.26
              },
              data: linesData
            },
            {
              name: "攻击源", type: "effectScatter", coordinateSystem: "geo", zlevel: 6,
              rippleEffect: { brushType: "stroke", scale: 2.8 },
              symbolSize: function (val) { return Math.max(6, Math.min(16, (val[2] || 0) / 450)); },
              itemStyle: { color: "#29c0f9" },
              label: { show: true, formatter: "{b}", position: "top", color: "#9ad8ff", fontSize: 11 },
              data: scatterData
            },
            {
              name: "目标节点", type: "effectScatter", coordinateSystem: "geo", zlevel: 7,
              rippleEffect: { brushType: "stroke", scale: 4.2 }, symbolSize: 18,
              itemStyle: { color: "#ff4f73", shadowBlur: 14, shadowColor: "#ff4f73" },
              label: { show: true, formatter: TARGET_NAME, position: "right", color: "#ffd8e2", fontSize: 12 },
              data: [{ name: TARGET_NAME, value: [TARGET_COORD[0], TARGET_COORD[1], 1] }]
            }
          ]
        }, true);

        drawAttackOverlay(linesData);
      }

      function drawAttackOverlay(linesData) {
        if (!overlay || !Array.isArray(linesData)) return;
        var w = overlay.clientWidth || 1200;
        var h = overlay.clientHeight || 700;
        overlay.setAttribute("viewBox", "0 0 " + w + " " + h);

        var paths = [];
        linesData.forEach(function (line) {
          var fromPx = chinaChart.convertToPixel({ geoIndex: 0 }, line.coords[0]);
          var toPx = chinaChart.convertToPixel({ geoIndex: 0 }, line.coords[1]);
          if (!Array.isArray(fromPx) || !Array.isArray(toPx)) return;
          var x1 = fromPx[0], y1 = fromPx[1], x2 = toPx[0], y2 = toPx[1];
          if (!isFinite(x1) || !isFinite(y1) || !isFinite(x2) || !isFinite(y2)) return;

          var mx = (x1 + x2) / 2;
          var my = (y1 + y2) / 2 - Math.max(40, Math.abs(x2 - x1) * 0.18);
          paths.push('<path class="attack-arc" d="M ' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' Q ' + mx.toFixed(2) + ' ' + my.toFixed(2) + ' ' + x2.toFixed(2) + ' ' + y2.toFixed(2) + '"></path>');
          paths.push('<circle class="attack-dot" cx="' + x1.toFixed(2) + '" cy="' + y1.toFixed(2) + '" r="3.5"></circle>');
          paths.push('<text class="attack-label" x="' + (x1 + 4).toFixed(2) + '" y="' + (y1 - 6).toFixed(2) + '">' + (line.fromName || "") + '</text>');
        });
        overlay.innerHTML = paths.join("");
      }

      function loadChinaGeo(callback) {
        if (chinaReady) { callback(); return; }
        $.get("/admin/data/china.json", function (geo) {
          echarts.registerMap("china", geo);
          chinaReady = true;
          callback();
        }, "json").fail(function () {
          popup.failure("中国地图数据加载失败");
        });
      }

      function loadAllData() {
        return $.get(dataUrl, function (res) {
          if (!res || res.code !== 200 || !res.data) {
            popup.failure((res && res.msg) || "大屏数据接口异常");
            return;
          }
          state.wafStatus = res.data.wafStatus || {};
          state.chinaRegion = withMockChinaRegion((res.data.sourceRegion && res.data.sourceRegion.china) || []);
          state.trafficRows = Array.isArray(res.data.trafficRows) ? res.data.trafficRows : [];
          state.nodeSummary = Array.isArray(res.data.nodeSummary) ? res.data.nodeSummary : [];
          state.nodeStat = res.data.nodeStat || {};
          state.masterIp = res.data.masterIp || "";

          renderRank();
          renderTrend();
          renderAlerts();
          renderBottom();
          renderMap();
        }, "json");
      }

      function setupFullscreen() {
        var btn = document.getElementById("btnFullscreen");
        if (!btn) return;
        function isFull() {
          return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
        }
        function updateBtn() {
          btn.textContent = isFull() ? "退出全屏" : "全屏";
        }
        btn.addEventListener("click", function () {
          var el = document.documentElement;
          if (!isFull()) {
            (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
          } else {
            (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
          }
        });
        document.addEventListener("fullscreenchange", updateBtn);
        document.addEventListener("webkitfullscreenchange", updateBtn);
        updateBtn();
      }

      function setupGenerateUrl() {
        function copyText(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text);
          return new Promise(function (resolve, reject) {
            try {
              var input = document.createElement("textarea");
              input.value = text;
              input.style.position = "fixed";
              input.style.opacity = "0";
              document.body.appendChild(input);
              input.focus();
              input.select();
              var ok = document.execCommand("copy");
              document.body.removeChild(input);
              if (ok) resolve(); else reject(new Error("copy command failed"));
            } catch (e) { reject(e); }
          });
        }

        function showUrlDialog(url, expText) {
          var html = '' +
            '<div style="padding:18px 18px 0 18px;">' +
              '<div style="font-size:14px;color:#334155;margin-bottom:10px;">复制以下链接用于大屏展示：</div>' +
              '<div style="display:flex;gap:10px;align-items:center;">' +
                '<input id="shareUrlInput" readonly value="' + url.replace(/"/g, '&quot;') + '" ' +
                  'style="flex:1;height:40px;border:1px solid #d1d5db;border-radius:8px;padding:0 12px;font-size:14px;color:#111827;background:#fff;" />' +
                '<button id="copyShareUrlBtn" type="button" ' +
                  'style="height:40px;padding:0 16px;border:1px solid #0ea5e9;background:#0284c7;color:#fff;border-radius:8px;cursor:pointer;white-space:nowrap;">复制</button>' +
              '</div>' +
              '<div style="margin-top:12px;font-size:12px;color:#64748b;line-height:1.6;word-break:break-all;">过期时间：' + (expText || '-') + '</div>' +
            '</div>';

          var idx = layer.open({
            type: 1, title: "URL生成", area: ["720px", "250px"], shadeClose: true, resize: false, content: html,
            success: function (layero) {
              layero.find(".layui-layer-content").css("overflow", "hidden");
              var input = document.getElementById("shareUrlInput");
              var copyBtn = document.getElementById("copyShareUrlBtn");
              if (input) { input.focus(); input.select(); }
              if (copyBtn) {
                copyBtn.onclick = function () {
                  copyText(url).then(function () { popup.success("已复制到剪贴板"); })
                    .catch(function () { popup.failure("自动复制失败，请手动复制"); });
                };
              }
            },
            btn: ["关闭"], yes: function () { layer.close(idx); }
          });
        }

        var btn = document.getElementById("btnGenerateUrl");
        if (!btn) return;
        if (isShareMode) { btn.style.display = "none"; return; }
        btn.addEventListener("click", function () {
          $.post("/screen/url/create?mode=china", {}, function (res) {
            if (!res || res.code !== 0 || !res.data || !res.data.url) {
              popup.failure((res && res.msg) || "URL生成失败");
              return;
            }
            showUrlDialog(res.data.url, res.data.expire_at_text || "");
          }, "json").fail(function () {
            popup.failure("URL生成接口异常");
          });
        });
      }

      function setupSwitchTheme() {
        var btn = document.getElementById("btnSwitchTheme");
        if (!btn) return;
        btn.addEventListener("click", function () {
          var q = window.location.search || "";
          window.location.href = "/screen/china/light" + q;
        });
      }

      loadChinaGeo(function () { loadAllData(); });
      setupFullscreen();
      setupGenerateUrl();
      setupSwitchTheme();
      updateTime();
      setInterval(updateTime, 1000);
      setInterval(loadAllData, 60000);
      window.addEventListener("resize", function () {
        chinaChart.resize();
        drawAttackOverlay(latestLinesData);
      });
      chinaChart.on("finished", function () {
        drawAttackOverlay(latestLinesData);
      });
    });
  </script>
</body>
</html>
