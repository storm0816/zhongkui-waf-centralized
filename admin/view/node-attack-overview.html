<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节点攻击大屏</title>
  <link href="../component/pear/css/pear.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
    }
    .screen-body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: #1f2937;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .screen-wrap {
      padding: 16px;
      max-width: 1720px;
      margin: 0 auto;
    }
    .screen-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 16px;
    }
    .screen-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .screen-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #111827;
    }
    .screen-subtitle {
      font-size: 13px;
      color: #64748b;
    }
    .screen-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }
    .screen-tools .tool-input,
    .screen-tools .tool-select {
      height: 36px !important;
      line-height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      padding: 0 10px;
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
      box-sizing: border-box;
    }
    .screen-tools .tool-input:hover,
    .screen-tools .tool-select:hover {
      border-color: #94a3b8;
    }
    .screen-tools .tool-input:focus,
    .screen-tools .tool-select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }
    .screen-tools .tool-input {
      width: 96px;
      text-align: center;
      font-weight: 600;
      background: #f8fafc;
    }
    .screen-tools .tool-select {
      min-width: 116px;
      padding-right: 28px;
      background: #ffffff;
    }
    .screen-tools .pear-btn {
      height: 36px;
      line-height: 36px;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 13px;
      box-shadow: none;
    }
    .screen-tools .pear-btn-warming {
      background: #f59e0b;
      border-color: #f59e0b;
    }
    .screen-tools .pear-btn-warming:hover {
      background: #d97706;
      border-color: #d97706;
    }
    .tool-label {
      font-size: 12px;
      color: #64748b;
      margin-right: 2px;
      font-weight: 600;
    }
    .screen-main {
      position: relative;
      min-height: calc(100vh - 112px);
      display: block;
    }
    .screen-stage {
      position: relative;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #f8fafc;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      min-height: calc(100vh - 128px);
    }
    .stage-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.16) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }
    .node-stage {
      position: absolute;
      inset: 0;
      padding: 56px 12px 12px 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
      gap: 10px;
      align-content: start;
      overflow: auto;
    }
    .node-item {
      position: relative;
      width: auto;
      padding: 10px 10px 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #86efac;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
      transition: all .22s ease;
      background: linear-gradient(180deg, #f0fdf4, #dcfce7);
    }
    .node-item:hover {
      transform: translateY(-2px);
    }
    .node-item.safe {
      border-color: #4ade80;
    }
    .node-item.danger {
      border-color: #f87171;
      background: linear-gradient(180deg, #fff1f2, #ffe4e6);
      animation: pulse-red 1.8s infinite;
      box-shadow: 0 4px 14px rgba(248, 113, 113, 0.26);
    }
    .node-item.master {
      outline: 2px solid #38bdf8;
    }
    .node-item.active {
      outline: 2px solid #f59e0b;
      transform: translateY(-2px);
    }
    .node-ip {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .4px;
      font-family: Menlo, Consolas, monospace;
      color: #1f2937;
    }
    .node-meta {
      margin-top: 5px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #334155;
    }
    .node-host {
      margin-top: 4px;
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log-drawer {
      position: fixed;
      right: 16px;
      top: 72px;
      bottom: 16px;
      width: min(48vw, 820px);
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      transform: translateX(calc(100% + 24px));
      transition: transform .24s ease;
      z-index: 1201;
    }
    .log-drawer.open {
      transform: translateX(0);
    }
    .drawer-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
      z-index: 1200;
    }
    .drawer-mask.show {
      opacity: 1;
      pointer-events: auto;
    }
    .side-head {
      padding: 12px 14px;
      border-bottom: 1px solid #e5e7eb;
    }
    .side-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .side-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
    }
    .drawer-close {
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #475569;
      border-radius: 8px;
      height: 30px;
      line-height: 28px;
      padding: 0 10px;
      cursor: pointer;
      font-size: 12px;
    }
    .drawer-close:hover {
      border-color: #94a3b8;
      color: #1f2937;
    }
    .side-sub {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .stat-chip {
      border: 1px solid #cbd5e1;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      color: #334155;
      background: #f8fafc;
    }
    .side-table {
      flex: 1;
      padding: 12px;
      overflow: auto;
      background: #f8fafc;
    }
    .summary-bar {
      position: absolute;
      left: 10px;
      top: 10px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .summary-pill {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #334155;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }
    .empty-tip {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 14px;
    }
    @keyframes pulse-red {
      0% { box-shadow: 0 2px 10px rgba(248, 113, 113, 0.18); }
      50% { box-shadow: 0 6px 18px rgba(248, 113, 113, 0.34); }
      100% { box-shadow: 0 2px 10px rgba(248, 113, 113, 0.18); }
    }
    @media (max-width: 1260px) {
      .screen-topbar {
        flex-direction: column;
      }
      .screen-tools {
        width: 100%;
        justify-content: flex-start;
      }
      .log-drawer {
        right: 8px;
        left: 8px;
        top: 64px;
        bottom: 8px;
        width: auto;
      }
    }
  </style>
</head>
<body class="screen-body">
  <div class="drawer-mask" id="drawer-mask"></div>
  <div class="screen-wrap">
    <div class="screen-topbar">
      <div class="screen-title-wrap">
        <div class="screen-title">节点攻击态势大屏</div>
        <div class="screen-subtitle">按节点实时观察攻击热度，红色节点表示最近5分钟攻击达到阈值</div>
      </div>
      <div class="screen-tools">
        <span class="tool-label">阈值</span>
        <input id="dangerThreshold" type="number" min="1" value="20" class="tool-input layui-input-inline" title="最近5分钟攻击阈值" />
        <span class="tool-label">时间窗</span>
        <select id="windowMinutes" class="tool-select layui-input-inline">
          <option value="30">最近30分钟</option>
          <option value="60">最近1小时</option>
          <option value="180">最近3小时</option>
          <option value="720">最近12小时</option>
          <option value="1440">最近24小时</option>
        </select>
        <span class="tool-label">自动刷新</span>
        <select id="autoRefreshSeconds" class="tool-select layui-input-inline" style="min-width:90px;">
          <option value="5">5秒</option>
          <option value="30" selected>30秒</option>
          <option value="60">60秒</option>
          <option value="0">关闭</option>
        </select>
        <button class="pear-btn pear-btn-warming pear-btn-sm" id="btn-auto-refresh">自动刷新: 30s</button>
        <span class="stat-chip" id="auto-refresh-status">下次刷新: 30s</span>
        <button class="pear-btn pear-btn-primary pear-btn-sm" id="btn-refresh">刷新</button>
      </div>
    </div>

    <div class="screen-main">
      <div class="screen-stage">
        <div class="summary-bar">
          <div class="summary-pill" id="sum-total">节点总数: 0</div>
          <div class="summary-pill" id="sum-danger">告警节点: 0</div>
          <div class="summary-pill" id="sum-safe">安全节点: 0</div>
        </div>
        <div class="stage-grid"></div>
        <div class="node-stage" id="node-stage"></div>
        <div class="empty-tip" id="empty-tip" style="display:none;">暂无节点数据，请检查节点心跳是否已写入</div>
      </div>
    </div>
  </div>
  <div class="log-drawer" id="log-drawer">
    <div class="side-head">
      <div class="side-head-top">
        <div class="side-title">节点攻击日志</div>
        <button type="button" class="drawer-close" id="btn-close-drawer">关闭</button>
      </div>
      <div class="side-sub">
        <span class="stat-chip">节点IP: <span id="selected-node-ip">未选择</span></span>
        <span class="stat-chip">主机: <span id="selected-node-host">-</span></span>
        <span class="stat-chip">规则版本: <span id="selected-node-version">-</span></span>
      </div>
    </div>
    <div class="side-table">
      <table id="id-table-node-logs" lay-filter="filter-node-logs"></table>
    </div>
  </div>

  <script type="text/html" id="logs-bar">
    <i class="layui-icon layui-icon-tips" style="cursor:pointer;" lay-event="detail" title="详情"></i>
  </script>

  <script src="../component/layui/layui.js"></script>
  <script src="../component/pear/pear.js"></script>
  <script src="../js/action.js"></script>
  <script src="../js/attackType.js"></script>
  <script>
    layui.use(['table', 'jquery', 'layer'], function () {
      var table = layui.table;
      var $ = layui.$;
      var layer = layui.layer;
      var nodes = [];
      var selectedNodeIp = '';
      var masterIp = '';
      var refreshTimer = null;
      var refreshCountdownTimer = null;
      var nextRefreshIn = 0;
      var dangerWindowMinutes = 5;
      var drawerOpen = false;

      function openLogDrawer() {
        $('#log-drawer').addClass('open');
        $('#drawer-mask').addClass('show');
        drawerOpen = true;
        setTimeout(function () {
          if (table.resize) table.resize('id-table-node-logs');
        }, 260);
      }

      function closeLogDrawer() {
        $('#log-drawer').removeClass('open');
        $('#drawer-mask').removeClass('show');
        drawerOpen = false;
        selectedNodeIp = '';
        setSelectedNode(null);
        renderNodes();
      }

      function ipToNumber(ip) {
        if (!ip) return null;
        var m = String(ip).match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)$/);
        if (!m) return null;
        return (Number(m[1]) * 16777216) + (Number(m[2]) * 65536) + (Number(m[3]) * 256) + Number(m[4]);
      }

      function compareNodes(a, b) {
        var aIp = a && a.node_ip ? String(a.node_ip) : '';
        var bIp = b && b.node_ip ? String(b.node_ip) : '';
        var aNum = ipToNumber(aIp);
        var bNum = ipToNumber(bIp);

        if (aNum !== null && bNum !== null) return aNum - bNum;
        if (aNum !== null) return -1;
        if (bNum !== null) return 1;
        return aIp.localeCompare(bIp);
      }

      function setSelectedNode(node) {
        selectedNodeIp = node ? node.node_ip : '';
        $('#selected-node-ip').text(selectedNodeIp || '未选择');
        $('#selected-node-host').text(node ? (node.hostname || '-') : '-');
        $('#selected-node-version').text(node ? (node.rules_version || 'unknown') : '-');
        table.reload('id-table-node-logs', {
          where: { nodeIp: selectedNodeIp || '__none__' },
          page: { curr: 1 }
        });
      }

      function renderNodes() {
        var stage = $('#node-stage');
        stage.empty();
        var dangerThreshold = Math.max(1, Number($('#dangerThreshold').val() || 20));

        var total = nodes.length;
        if (total === 0) {
          $('#empty-tip').show();
          $('#sum-total').text('节点总数: 0');
          $('#sum-danger').text('告警节点: 0');
          $('#sum-safe').text('安全节点: 0');
          setSelectedNode(null);
          return;
        }
        $('#empty-tip').hide();

        var dangerCount = 0;
        for (var k = 0; k < nodes.length; k++) {
          if (nodes[k].is_danger) dangerCount++;
        }
        $('#sum-total').text('节点总数: ' + total);
        $('#sum-danger').text('告警节点: ' + dangerCount);
        $('#sum-safe').text('安全节点: ' + (total - dangerCount));

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];

          var danger = !!n.is_danger;
          var cls = 'node-item ' + (danger ? 'danger' : 'safe');
          if (n.node_ip === masterIp) cls += ' master';
          if (n.node_ip === selectedNodeIp) cls += ' active';

          var html = ''
            + '<div class="' + cls + '" data-ip="' + (n.node_ip || '') + '">'
            + '<div class="node-ip">' + (n.node_ip || '-') + (n.node_ip === masterIp ? ' (master)' : '') + '</div>'
            + '<div class="node-host">' + (n.hostname || '-') + '</div>'
            + '<div class="node-meta"><span>5m攻击:' + (n.attack_count_5m || 0) + '/' + dangerThreshold + '</span><span>拦截:' + (n.block_count || 0) + '</span></div>'
            + '</div>';
          stage.append(html);
        }

        if (!selectedNodeIp && nodes[0]) {
          setSelectedNode(nodes[0]);
        }
      }

      function applyDangerThreshold(baseNodes, thresholdNodes) {
        var threshold = Math.max(1, Number($('#dangerThreshold').val() || 20));
        var dangerMap = {};
        for (var i = 0; i < (thresholdNodes || []).length; i++) {
          var row = thresholdNodes[i] || {};
          dangerMap[row.node_ip] = Number(row.attack_count || 0);
        }
        for (var j = 0; j < (baseNodes || []).length; j++) {
          var n = baseNodes[j];
          n.attack_count_5m = Number(dangerMap[n.node_ip] || 0);
          n.is_danger = n.attack_count_5m >= threshold;
        }
      }

      function fetchSummary() {
        var windowMinutes = Number($('#windowMinutes').val() || 30);
        $.get('/clusternode/attack/summary', { windowMinutes: windowMinutes }, function (resMain) {
          if (!resMain || Number(resMain.code) !== 0) {
            layer.msg('加载节点攻击态势失败(主窗口)');
            return;
          }

          $.get('/clusternode/attack/summary', { windowMinutes: dangerWindowMinutes }, function (resDanger) {
            if (!resDanger || Number(resDanger.code) !== 0) {
              layer.msg('加载节点攻击阈值数据失败');
              return;
            }

            nodes = resMain.data || [];
            nodes.sort(compareNodes);
            masterIp = resMain.master_ip || '';
            applyDangerThreshold(nodes, resDanger.data || []);

            if (selectedNodeIp) {
              var exists = false;
              for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].node_ip === selectedNodeIp) {
                  exists = true;
                  setSelectedNode(nodes[i]);
                  break;
                }
              }
              if (!exists) setSelectedNode(null);
            }
            renderNodes();
          });
        });
      }

      function updateAutoRefreshStatus(sec) {
        if (!sec || sec <= 0) {
          $('#btn-auto-refresh').text('自动刷新: 关闭');
          $('#auto-refresh-status').text('下次刷新: 已关闭');
          return;
        }
        $('#btn-auto-refresh').text('自动刷新: ' + sec + 's');
        $('#auto-refresh-status').text('下次刷新: ' + nextRefreshIn + 's');
      }

      function resetAutoRefreshTimer() {
        if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
        if (refreshCountdownTimer) {
          clearInterval(refreshCountdownTimer);
          refreshCountdownTimer = null;
        }

        var sec = Number($('#autoRefreshSeconds').val() || 0);
        if (sec > 0) {
          nextRefreshIn = sec;
          refreshTimer = setInterval(function () {
            fetchSummary();
            nextRefreshIn = sec;
            updateAutoRefreshStatus(sec);
          }, sec * 1000);
          refreshCountdownTimer = setInterval(function () {
            if (nextRefreshIn > 0) {
              nextRefreshIn--;
            }
            updateAutoRefreshStatus(sec);
          }, 1000);
          updateAutoRefreshStatus(sec);
          layer.msg('自动刷新已设置为 ' + sec + ' 秒');
        } else {
          nextRefreshIn = 0;
          updateAutoRefreshStatus(0);
          layer.msg('自动刷新已关闭');
        }
      }

      table.render({
        elem: '#id-table-node-logs',
        id: 'id-table-node-logs',
        url: '/events/list',
        where: { nodeIp: '__none__' },
        page: true,
        limits: [10, 20, 50, 100],
        limit: 10,
        cols: [[
          { field: 'request_time', title: '攻击时间', width: 160 },
          { field: 'ip', title: '攻击者IP', width: 140 },
          { field: 'server_name', title: '域名', minWidth: 120 },
          { field: 'request_uri', title: '请求地址', minWidth: 220 },
          { field: 'attack_type', title: '攻击类型', width: 120, templet: function (d) { return getAttackTypeText(d.attack_type); } },
          { field: 'action', title: '处置动作', width: 90, templet: function (d) { return getActionText(d.action); } },
          { title: '详情', width: 60, toolbar: '#logs-bar' }
        ]]
      });

      table.on('tool(filter-node-logs)', function (obj) {
        if (obj.event !== 'detail') return;
        $.get('/events/get', { id: obj.data.id }, function (res) {
          if (!res || !res.data) {
            layer.msg('加载详情失败');
            return;
          }
          var d = res.data;
          var html = ''
            + '<div style="padding:12px;">'
            + '<p><b>节点IP：</b>' + (d.node_ip || '-') + '</p>'
            + '<p><b>攻击类型：</b>' + (getAttackTypeText(d.attack_type) || d.attack_type || '-') + '</p>'
            + '<p><b>处置动作：</b>' + (getActionText(d.action) || d.action || '-') + '</p>'
            + '<p><b>请求URI：</b>' + (d.request_uri || '-') + '</p>'
            + '<p><b>攻击时间：</b>' + (d.request_time || '-') + '</p>'
            + '<hr/>'
            + '<p><b>请求报文：</b></p><pre style="max-height:180px;overflow:auto;">' + (d.request_body || '无') + '</pre>'
            + '<p><b>响应报文：</b></p><pre style="max-height:180px;overflow:auto;">' + (d.response_body || '无') + '</pre>'
            + '</div>';
          layer.open({
            type: 1,
            title: '攻击日志详情',
            area: ['760px', '680px'],
            content: html
          });
        });
      });

      $(document).on('click', '.node-item', function () {
        var ip = $(this).data('ip');
        var node = null;
        for (var i = 0; i < nodes.length; i++) {
          if (nodes[i].node_ip === ip) {
            node = nodes[i];
            break;
          }
        }
        setSelectedNode(node);
        renderNodes();
        openLogDrawer();
      });
      $('#btn-close-drawer').on('click', function () {
        closeLogDrawer();
      });
      $('#drawer-mask').on('click', function () {
        closeLogDrawer();
      });

      $('#btn-refresh').on('click', function () {
        fetchSummary();
        var sec = Number($('#autoRefreshSeconds').val() || 0);
        if (sec > 0) {
          nextRefreshIn = sec;
          updateAutoRefreshStatus(sec);
        }
      });

      $('#windowMinutes').on('change', function () {
        fetchSummary();
      });
      $('#dangerThreshold').on('change', function () {
        fetchSummary();
      });
      $('#btn-auto-refresh').on('click', function () {
        resetAutoRefreshTimer();
      });
      $('#autoRefreshSeconds').on('change', function () {
        resetAutoRefreshTimer();
      });

      fetchSummary();
      resetAutoRefreshTimer();
      $(window).on('resize', function () {
        renderNodes();
      });
      $(window).on('beforeunload', function () {
        if (refreshTimer) clearInterval(refreshTimer);
        if (refreshCountdownTimer) clearInterval(refreshCountdownTimer);
      });
    });
  </script>
</body>
</html>
