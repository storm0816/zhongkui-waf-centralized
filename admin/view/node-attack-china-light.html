<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浅中国攻击态势</title>
  <link href="/component/pear/css/pear.css" rel="stylesheet">
  <style>
    :root {
      --bg: #eef1fb;
      --ink: #1f2448;
      --muted: #7f86a8;
      --line: #dde2f1;
      --blue: #5a77ff;
      --purple: #a167ff;
      --cyan: #54c0ff;
      --orange: #ff9860;
      --green: #56c58b;
      --red: #ff718b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(1000px 580px at 0% -10%, #fff 0, #eef2ff 52%, #e9edf8 100%),
        linear-gradient(140deg, #f6f8ff 0%, #ecf0fc 100%);
      color: var(--ink);
      overflow: hidden;
    }

    .shell { height: 100vh; padding: 10px; }
    .board {
      position: relative;
      height: 100%;
      border-radius: 18px;
      border: 1px solid #d8ddee;
      background: linear-gradient(170deg, rgba(255,255,255,.9), rgba(242,245,255,.95));
      box-shadow: 0 18px 40px rgba(94,108,168,.14);
      overflow: hidden;
    }

    .topbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 54px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      z-index: 20;
      background: rgba(255,255,255,.5);
      backdrop-filter: blur(4px);
    }
    .brand { font-weight: 700; letter-spacing: .02em; display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: linear-gradient(140deg, var(--purple), var(--blue)); }
    .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
    .btn {
      border: 1px solid #cbd5f0;
      background: rgba(255,255,255,.86);
      color: #3d4673;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { background: #fff; border-color: #b5c3ec; }

    #chinaMap {
      position: absolute;
      inset: 54px 0 0 0;
      z-index: 1;
    }
    #attackOverlay {
      position: absolute;
      inset: 54px 0 0 0;
      z-index: 5;
      pointer-events: none;
    }

    .left-stat {
      position: absolute;
      left: 20px;
      top: 122px;
      width: 220px;
      z-index: 12;
      padding: 6px 4px;
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .small { color: #5f6892; font-size: 12px; }
    .activity { margin-top: 10px; }
    .row {
      display: grid;
      grid-template-columns: 78px 1fr 64px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      margin: 6px 0;
    }
    .bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(207,214,238,.6);
      overflow: hidden;
    }
    .bar > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
    }

    .bottom-left {
      position: absolute;
      left: 24px;
      bottom: 22px;
      z-index: 12;
      display: grid;
      grid-template-columns: repeat(3, 96px);
      gap: 10px;
    }
    .mini {
      border-radius: 10px;
      color: #fff;
      padding: 10px;
      box-shadow: 0 10px 18px rgba(83,98,159,.2);
    }
    .mini:nth-child(1) { background: linear-gradient(160deg, #7069f9, #5a57de); }
    .mini:nth-child(2) { background: linear-gradient(160deg, #57c3ff, #3e97ea); }
    .mini:nth-child(3) { background: linear-gradient(160deg, #ffa167, #ef7d42); }
    .mini .n { font-size: 19px; font-weight: 700; margin-top: 8px; }
    .mini .t { font-size: 11px; opacity: .92; }

    .bottom-right {
      position: absolute;
      right: 22px;
      bottom: 22px;
      z-index: 12;
      display: flex;
      gap: 24px;
      align-items: stretch;
      padding: 14px 18px;
      min-width: 360px;
      border: 1px solid rgba(208, 216, 242, .85);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(245,248,255,.84));
      box-shadow: 0 14px 30px rgba(94,108,168,.12);
      backdrop-filter: blur(10px);
    }
    .kv { color: #2e3562; font-size: 12px; min-width: 120px; }
    .kv .n {
      font-size: 33px;
      line-height: 1;
      font-weight: 700;
      margin-top: 6px;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #ruleVersion {
      font-size: 18px;
      margin-top: 11px;
      white-space: normal;
      word-break: break-all;
      line-height: 1.25;
      max-width: 240px;
      overflow: visible;
    }

    .attack-arc {
      fill: none;
      stroke: rgba(82, 123, 255, .95);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-dasharray: 8 8;
      animation: dash 1.2s linear infinite;
    }
    .attack-dot { fill: #ff718b; animation: pulse 1.4s ease-in-out infinite; }
    .attack-label {
      fill: #2f3766;
      font-size: 11px;
      paint-order: stroke;
      stroke: rgba(255,255,255,.95);
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    @keyframes dash { to { stroke-dashoffset: -16; } }
    @keyframes pulse {
      0%, 100% { r: 3.5; opacity: .9; }
      50% { r: 6; opacity: 1; }
    }

    @media (max-width: 980px) {
      .left-stat { width: 220px; }
      .bottom-right {
        right: 12px;
        gap: 14px;
        min-width: 0;
        padding: 12px;
      }
      .kv .n { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="board">
      <div class="topbar">
        <div class="brand"><span class="dot"></span> 中国网络安全感知大数据</div>
        <div class="meta">
          <span>数据源: /screen/global/data</span>
          <span id="nowTime">--</span>
          <button id="btnGenerateUrl" class="btn" type="button">URL生成</button>
          <button id="btnFullscreen" class="btn" type="button">全屏</button>
        </div>
      </div>

      <div id="chinaMap"></div>
      <svg id="attackOverlay" viewBox="0 0 1200 700" preserveAspectRatio="none"></svg>

      <div class="left-stat">
        <div style="font-size:30px; font-weight:700; line-height:1;" id="reqTotal">0</div>
        <div class="small">攻击源排行（30天）</div>
        <div class="activity" id="activityList"></div>
      </div>

      <div class="bottom-left">
        <div class="mini"><div class="t">今日拦截</div><div class="n" id="blockTotal">0</div></div>
        <div class="mini"><div class="t">验证码通过</div><div class="n" id="captchaPass">0</div></div>
        <div class="mini"><div class="t">在线节点</div><div class="n" id="nodeOnline">0</div></div>
      </div>

      <div class="bottom-right">
        <div class="kv"><div>今日请求总数</div><div class="n" id="attackTotal">0</div></div>
        <div class="kv"><div>规则版本</div><div class="n" id="ruleVersion">unknown</div></div>
      </div>
    </div>
  </div>

  <script src="/component/layui/layui.js"></script>
  <script src="/component/pear/pear.js"></script>
  <script>
    layui.use(["jquery", "echarts", "popup", "layer"], function () {
      var $ = layui.$;
      var echarts = layui.echarts;
      var popup = layui.popup;
      var layer = layui.layer;

      var params = new URLSearchParams(window.location.search || "");
      var token = params.get("token") || "";
      var isShareMode = window.location.pathname === "/screen/china/light";
      var dataUrl = "/screen/global/data" + (token ? ("?token=" + encodeURIComponent(token)) : "");

      var chinaChart = echarts.init(document.getElementById("chinaMap"));
      var overlay = document.getElementById("attackOverlay");
      var chinaReady = false;
      var latestLinesData = [];
      var TARGET = [121.4737, 31.2304];
      var TARGET_NAME = "10.15.108.11 · 上海";
      var PROVINCE = {
        "北京": [116.40, 39.90], "天津": [117.20, 39.12], "河北": [114.48, 38.03], "山西": [112.55, 37.87],
        "内蒙古": [111.73, 40.83], "辽宁": [123.43, 41.80], "吉林": [125.32, 43.90], "黑龙江": [126.63, 45.75],
        "上海": [121.47, 31.23], "江苏": [118.78, 32.04], "浙江": [120.15, 30.28], "安徽": [117.27, 31.86],
        "福建": [119.30, 26.08], "江西": [115.89, 28.68], "山东": [117.00, 36.67], "河南": [113.62, 34.75],
        "湖北": [114.30, 30.60], "湖南": [112.98, 28.20], "广东": [113.27, 23.13], "广西": [108.32, 22.82],
        "海南": [110.35, 20.02], "重庆": [106.55, 29.57], "四川": [104.07, 30.67], "贵州": [106.71, 26.57],
        "云南": [102.71, 25.04], "西藏": [91.11, 29.97], "陕西": [108.95, 34.27], "甘肃": [103.84, 36.06],
        "青海": [101.78, 36.62], "宁夏": [106.23, 38.49], "新疆": [87.62, 43.82], "香港": [114.17, 22.30],
        "澳门": [113.54, 22.19], "台湾": [121.50, 25.03], "内网": [116.40, 39.90], "未知": [112.93, 28.23]
      };
      var MOCK_CHINA_REGION = [
        { name_cn: "广东", attack_times: 2860 },
        { name_cn: "浙江", attack_times: 2240 },
        { name_cn: "江苏", attack_times: 1980 },
        { name_cn: "山东", attack_times: 1760 },
        { name_cn: "四川", attack_times: 1540 },
        { name_cn: "湖北", attack_times: 1330 },
        { name_cn: "福建", attack_times: 1180 },
        { name_cn: "河南", attack_times: 1060 },
        { name_cn: "北京", attack_times: 960 },
        { name_cn: "上海", attack_times: 880 },
        { name_cn: "湖南", attack_times: 760 },
        { name_cn: "重庆", attack_times: 620 }
      ];

      function n(v) { v = Number(v); return isFinite(v) ? v : 0; }
      function fmt(v) { return n(v).toLocaleString(); }
      function pad(v) { return String(v).padStart(2, "0"); }
      function tick() {
        var d = new Date();
        $("#nowTime").text(d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds()));
      }
      function withMockChinaRegion(region) {
        var list = [];
        var exists = {};
        (Array.isArray(region) ? region : []).forEach(function (item) {
          var name = item && (item.name_cn || item.name_en || "");
          if (!name || exists[name]) return;
          exists[name] = true;
          list.push({
            name_cn: name,
            name_en: name,
            attack_times: n(item.attack_times)
          });
        });
        if (list.length >= 6) return list;

        MOCK_CHINA_REGION.forEach(function (item, idx) {
          if (exists[item.name_cn]) return;
          exists[item.name_cn] = true;
          list.push({
            name_cn: item.name_cn,
            name_en: item.name_cn,
            attack_times: item.attack_times
          });
        });
        return list;
      }

      function renderKpi(data) {
        var ws = data.wafStatus || {};
        $("#blockTotal").text(fmt(ws.block_times));
        $("#captchaPass").text(fmt(ws.captcha_pass_times));

        var stat = data.nodeStat || {};
        $("#nodeOnline").text(n(stat.online) + "/" + n(stat.total));

        var summary = Array.isArray(data.nodeSummary) ? data.nodeSummary : [];
        var version = "unknown";
        if (summary.length > 0) {
          var masterIp = data.masterIp || "";
          var matched = summary.find(function (item) {
            return (item.node_ip || "") === masterIp;
          }) || summary[0];
          version = matched && matched.rules_version ? matched.rules_version : "unknown";
        }
        $("#ruleVersion").text(version);

        var region = withMockChinaRegion((data.sourceRegion && data.sourceRegion.china) || []);
        var totalAttack = region.reduce(function (s, x) { return s + n(x.attack_times); }, 0);
        $("#reqTotal").text(fmt(totalAttack));
        $("#attackTotal").text(fmt(ws.request_times));

        var top = region.slice().sort(function (a, b) {
          return n(b.attack_times) - n(a.attack_times);
        }).slice(0, 6);
        var max = top.length ? Math.max.apply(null, top.map(function (x) { return n(x.attack_times); })) : 1;
        var html = top.map(function (x) {
          var v = n(x.attack_times);
          var w = Math.round((v / max) * 100);
          return '<div class="row"><span>' + (x.name_cn || x.name_en || "-") + '</span><span class="bar"><i style="width:' + Math.max(8, w) + '%"></i></span><span>' + fmt(v) + '</span></div>';
        }).join("");
        $("#activityList").html(html || '<div class="small">暂无省份攻击数据</div>');
      }

      function renderMap(data) {
        if (!chinaReady) return;
        var region = withMockChinaRegion((data.sourceRegion && data.sourceRegion.china) || []);
        var mapData = region.map(function (x) {
          return { name: x.name_cn || x.name_en || "", value: n(x.attack_times) };
        }).filter(function (x) {
          return x.name && x.value > 0;
        });

        var src = mapData.filter(function (x) {
          if (x.name === "内网") return false;
          return !!PROVINCE[x.name];
        }).sort(function (a, b) {
          return b.value - a.value;
        }).slice(0, 10);

        var lines = src.map(function (x) {
          return { fromName: x.name, coords: [PROVINCE[x.name], TARGET], value: x.value };
        });
        latestLinesData = lines;

        var max = mapData.length ? Math.max.apply(null, mapData.map(function (x) { return x.value; })) : 100;
        if (max < 100) max = 100;

        chinaChart.setOption({
          tooltip: {
            trigger: "item",
            formatter: function (p) {
              var v = p.value || 0;
              if (Array.isArray(v)) v = v[2] || 0;
              return p.name + ": " + fmt(v);
            }
          },
          visualMap: {
            min: 1,
            max: max,
            show: false,
            inRange: { color: ["#f3f6ff", "#ccd8ff", "#99afff", "#8f79ff", "#ff7f9a"] }
          },
          geo: {
            map: "china",
            roam: true,
            scaleLimit: { min: 1, max: 5 },
            layoutCenter: ["50%", "50%"],
            layoutSize: "110%",
            itemStyle: { areaColor: "#f6f8ff", borderColor: "#d6ddef", borderWidth: .9 },
            emphasis: { itemStyle: { areaColor: "#dce7ff" } }
          },
          series: [
            { type: "map", map: "china", geoIndex: 0, data: mapData },
            {
              type: "lines",
              coordinateSystem: "geo",
              zlevel: 4,
              effect: {
                show: true,
                period: 3.4,
                trailLength: 0.18,
                symbol: "arrow",
                symbolSize: 7,
                color: "#ff8a65"
              },
              lineStyle: {
                color: "rgba(95, 131, 255, .72)",
                width: 2.2,
                opacity: 0.82,
                curveness: 0.22
              },
              data: lines
            },
            {
              type: "effectScatter",
              coordinateSystem: "geo",
              rippleEffect: { brushType: "stroke", scale: 2.5 },
              symbolSize: function (v) { return Math.max(6, Math.min(14, (v[2] || 0) / 500)); },
              itemStyle: { color: "#5f83ff" },
              label: { show: true, formatter: "{b}", position: "top", color: "#4a547f", fontSize: 11 },
              data: src.map(function (x) {
                var c = PROVINCE[x.name];
                return { name: x.name, value: [c[0], c[1], x.value] };
              })
            },
            {
              type: "effectScatter",
              coordinateSystem: "geo",
              rippleEffect: { brushType: "stroke", scale: 4.0 },
              symbolSize: 16,
              itemStyle: { color: "#ff718b" },
              label: { show: true, formatter: TARGET_NAME, position: "right", color: "#6b4d62", fontSize: 12 },
              data: [{ name: TARGET_NAME, value: [TARGET[0], TARGET[1], 1] }]
            }
          ]
        }, true);

        drawOverlay(lines);
      }

      function drawOverlay(lines) {
        if (!overlay || !Array.isArray(lines)) return;
        var w = overlay.clientWidth || 1200;
        var h = overlay.clientHeight || 700;
        overlay.setAttribute("viewBox", "0 0 " + w + " " + h);
        var paths = [];
        lines.forEach(function (line) {
          var a = chinaChart.convertToPixel({ geoIndex: 0 }, line.coords[0]);
          var b = chinaChart.convertToPixel({ geoIndex: 0 }, line.coords[1]);
          if (!Array.isArray(a) || !Array.isArray(b)) return;
          var x1 = a[0], y1 = a[1], x2 = b[0], y2 = b[1];
          if (!isFinite(x1) || !isFinite(y1) || !isFinite(x2) || !isFinite(y2)) return;
          var mx = (x1 + x2) / 2;
          var my = (y1 + y2) / 2 - Math.max(26, Math.abs(x2 - x1) * 0.16);
          paths.push('<path class="attack-arc" d="M ' + x1.toFixed(2) + ' ' + y1.toFixed(2) + ' Q ' + mx.toFixed(2) + ' ' + my.toFixed(2) + ' ' + x2.toFixed(2) + ' ' + y2.toFixed(2) + '"></path>');
          paths.push('<circle class="attack-dot" cx="' + x1.toFixed(2) + '" cy="' + y1.toFixed(2) + '" r="3.5"></circle>');
          paths.push('<text class="attack-label" x="' + (x1 + 4).toFixed(2) + '" y="' + (y1 - 6).toFixed(2) + '">' + (line.fromName || "") + '</text>');
        });
        overlay.innerHTML = paths.join("");
      }

      function loadGeo(cb) {
        if (chinaReady) return cb();
        $.get("/admin/data/china.json", function (geo) {
          echarts.registerMap("china", geo);
          chinaReady = true;
          cb();
        }, "json").fail(function () {
          popup.failure("中国地图数据加载失败");
        });
      }

      function loadData() {
        $.get(dataUrl, function (res) {
          if (!res || res.code !== 200 || !res.data) {
            popup.failure((res && res.msg) || "大屏数据接口异常");
            return;
          }
          renderKpi(res.data);
          renderMap(res.data);
        }, "json");
      }

      function setupFullscreen() {
        var btn = document.getElementById("btnFullscreen");
        if (!btn) return;
        function isFull() {
          return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
        }
        function updateBtn() {
          btn.textContent = isFull() ? "退出全屏" : "全屏";
        }
        btn.addEventListener("click", function () {
          var el = document.documentElement;
          if (!isFull()) {
            (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
          } else {
            (document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen).call(document);
          }
        });
        document.addEventListener("fullscreenchange", updateBtn);
        document.addEventListener("webkitfullscreenchange", updateBtn);
        updateBtn();
      }

      function setupGenerateUrl() {
        var btn = document.getElementById("btnGenerateUrl");
        if (!btn) return;
        if (isShareMode) {
          btn.style.display = "none";
          return;
        }

        function copyText(text) {
          if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text);
          return new Promise(function (resolve, reject) {
            try {
              var input = document.createElement("textarea");
              input.value = text;
              input.style.position = "fixed";
              input.style.opacity = "0";
              document.body.appendChild(input);
              input.focus();
              input.select();
              var ok = document.execCommand("copy");
              document.body.removeChild(input);
              if (ok) resolve(); else reject(new Error("copy command failed"));
            } catch (e) {
              reject(e);
            }
          });
        }

        function showUrlDialog(url, expText) {
          var html = '' +
            '<div style="padding:18px 18px 0 18px;">' +
              '<div style="font-size:14px;color:#334155;margin-bottom:10px;">复制以下链接用于大屏展示：</div>' +
              '<div style="display:flex;gap:10px;align-items:center;">' +
                '<input id="shareUrlInput" readonly value="' + url.replace(/"/g, '&quot;') + '" style="flex:1;height:40px;border:1px solid #d1d5db;border-radius:8px;padding:0 12px;font-size:14px;color:#111827;background:#fff;" />' +
                '<button id="copyShareUrlBtn" type="button" style="height:40px;padding:0 16px;border:1px solid #0ea5e9;background:#0284c7;color:#fff;border-radius:8px;cursor:pointer;white-space:nowrap;">复制</button>' +
              '</div>' +
              '<div style="margin-top:12px;font-size:12px;color:#64748b;line-height:1.6;word-break:break-all;">过期时间：' + (expText || '-') + '</div>' +
            '</div>';

          var idx = layer.open({
            type: 1,
            title: "URL生成",
            area: ["720px", "250px"],
            shadeClose: true,
            resize: false,
            content: html,
            success: function (layero) {
              layero.find(".layui-layer-content").css("overflow", "hidden");
              var input = document.getElementById("shareUrlInput");
              var copyBtn = document.getElementById("copyShareUrlBtn");
              if (input) {
                input.focus();
                input.select();
              }
              if (copyBtn) {
                copyBtn.onclick = function () {
                  copyText(url).then(function () {
                    popup.success("已复制到剪贴板");
                  }).catch(function () {
                    if (input) {
                      input.focus();
                      input.select();
                    }
                    popup.failure("自动复制失败，请手动复制");
                  });
                };
              }
            },
            btn: ["关闭"],
            yes: function () { layer.close(idx); }
          });
        }

        btn.addEventListener("click", function () {
          $.post("/screen/url/create?mode=china_light", {}, function (res) {
            if (!res || res.code !== 0 || !res.data || !res.data.url) {
              popup.failure((res && res.msg) || "URL生成失败");
              return;
            }
            showUrlDialog(res.data.url, res.data.expire_at_text || "");
          }, "json").fail(function () {
            popup.failure("URL生成接口异常");
          });
        });
      }

      loadGeo(function () { loadData(); });
      setupFullscreen();
      setupGenerateUrl();
      tick();
      setInterval(tick, 1000);
      setInterval(loadData, 60000);
      window.addEventListener("resize", function () {
        chinaChart.resize();
        drawOverlay(latestLinesData);
      });
      chinaChart.on("finished", function () {
        drawOverlay(latestLinesData);
      });
    });
  </script>
</body>
</html>
