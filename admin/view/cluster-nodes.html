<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>在线节点列表</title>
  <link href="../component/pear/css/pear.css" rel="stylesheet">
  <style>
    .offline-row {
      background-color: #ffecec !important;
      color: #c00 !important;
    }
    .stat-icon {
      font-size: 22px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .node-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 20px;
      background: #f2f4f7;
      color: #475467;
    }
    .node-pill.ok {
      background: #ecfdf3;
      color: #067647;
    }
    .node-pill.warn {
      background: #fffaeb;
      color: #b54708;
    }
    .node-pill.err {
      background: #fef3f2;
      color: #b42318;
    }
    .node-pill.master {
      background: #eff8ff;
      color: #175cd3;
    }
    .node-meta {
      line-height: 1.7;
    }
    .node-meta .main {
      color: #101828;
      font-weight: 600;
    }
    .node-meta .sub {
      color: #667085;
      font-size: 12px;
    }
    .state-stack {
      line-height: 1.7;
    }
    .state-stack .main {
      color: #101828;
      font-weight: 600;
    }
    .state-stack .sub {
      color: #667085;
      font-size: 12px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 4px 2px;
    }
    .detail-card {
      border: 1px solid #eaecf0;
      border-radius: 10px;
      padding: 12px 14px;
      background: #fff;
    }
    .detail-card h4 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #344054;
    }
    .layui-table-cell {
      height: auto !important;
      line-height: 1.7 !important;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .layui-table-view .layui-table td {
      padding-top: 2px;
      padding-bottom: 2px;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 6px 0;
      font-size: 13px;
      color: #475467;
    }
    .detail-item strong {
      color: #101828;
      font-weight: 600;
    }
  </style>
</head>
<body class="pear-container">

  <!-- 统计模块 -->
  <div class="layui-row layui-col-space10">
    <div class="layui-col-md4">
      <div class="layui-card">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-radio stat-icon"></i> 节点总数
        </div>
        <div class="layui-card-body" id="stat-total">-</div>
      </div>
    </div>
    <div class="layui-col-md4">
      <div class="layui-card">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-circle-dot stat-icon" style="color: green;"></i> 当前在线
        </div>
        <div class="layui-card-body" id="stat-online">-</div>
      </div>
    </div>
    <div class="layui-col-md4">
      <div class="layui-card">
        <div class="layui-card-header">
          <i class="layui-icon layui-icon-close stat-icon" style="color: red;"></i> 离线节点
        </div>
        <div class="layui-card-body" id="stat-offline">-</div>
      </div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="layui-card-header">
    <div class="layui-btn-group" style="float: right;">
      <button class="layui-btn layui-btn-primary layui-btn-sm" id="btn-show-all">显示全部</button>
      <button class="layui-btn layui-btn-danger layui-btn-sm" id="btn-show-offline">仅离线</button>
    </div>
    在线节点列表
  </div>

  <!-- 表格展示 -->
  <div class="layui-row">
    <div class="layui-col-md12">
      <div class="layui-card">
        <div class="layui-card-body">
          <table id="id-table-nodes" lay-filter="filter-table-nodes"></table>
        </div>
      </div>
    </div>
  </div>

  <script src="../component/layui/layui.js"></script>
  <script src="../component/pear/pear.js"></script>
  <script>
    layui.use(['table', 'jquery', 'layer'], function () {
      var table = layui.table;
      var $ = layui.$;
      var layer = layui.layer;
      var masterRulesVersion = 'unknown';
      var masterWhitelistVersion = 'unknown';
      var masterBlacklistVersion = 'unknown';

      function pad2(n) {
        return n < 10 ? '0' + n : '' + n;
      }

      function formatDateTime(ts) {
        var d = new Date(ts);
        if (isNaN(d.getTime())) {
          return '-';
        }
        return d.getFullYear() + '-' +
          pad2(d.getMonth() + 1) + '-' +
          pad2(d.getDate()) + ' ' +
          pad2(d.getHours()) + ':' +
          pad2(d.getMinutes()) + ':' +
          pad2(d.getSeconds());
      }

      function formatRulePublishTime(version) {
        if (!version || version === 'unknown') {
          return '-';
        }
        var n = Number(version);
        if (!isFinite(n) || n <= 0) {
          return '-';
        }
        if (n < 1000000000000) {
          n = n * 1000;
        }
        return formatDateTime(n);
      }

      function timeAgo(ts) {
        if (!ts) return '-';
        var d = new Date(String(ts).replace(/-/g, '/'));
        if (isNaN(d.getTime())) return '-';
        var diff = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
        if (diff < 60) return diff + '秒前';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        return Math.floor(diff / 86400) + '天前';
      }

      function statusClass(status) {
        if (status === 'ok') return 'ok';
        if (status === 'failed') return 'err';
        return 'warn';
      }

      function statusText(status) {
        if (status === 'ok') return '成功';
        if (status === 'failed') return '失败';
        return status || 'unknown';
      }

      function syncStateHtml(row) {
        if (row.node_role === 'master') {
          return '<span class="node-pill master">主节点</span>';
        }
        if (row.sync_state === 'ok') {
          return '<span class="node-pill ok">已同步</span>';
        }
        if (row.rules_sync_status === 'failed' || row.whitelist_sync_status === 'failed' || row.blacklist_sync_status === 'failed') {
          return '<span class="node-pill err">同步失败</span>';
        }
        return '<span class="node-pill warn">版本落后</span>';
      }

      function versionSummaryHtml(row) {
        return '' +
          '<div class="node-meta">' +
            '<div class="main">规则 ' + (row.rules_version || 'unknown') + '</div>' +
            '<div class="sub">白名单 ' + (row.whitelist_version || 'unknown') + ' / 黑名单 ' + (row.blacklist_version || 'unknown') + '</div>' +
          '</div>';
      }

      function versionStateHtml(row) {
        if (row.node_role === 'master') {
          return '<div class="state-stack"><div class="main">基准版本</div><div class="sub">主节点当前版本</div></div>';
        }
        var rulesOk = row.rules_version && row.rules_version !== 'unknown'
          && masterRulesVersion !== 'unknown' && row.rules_version === masterRulesVersion;
        var whiteOk = row.whitelist_version && row.whitelist_version !== 'unknown'
          && masterWhitelistVersion !== 'unknown' && row.whitelist_version === masterWhitelistVersion;
        var blackOk = row.blacklist_version && row.blacklist_version !== 'unknown'
          && masterBlacklistVersion !== 'unknown' && row.blacklist_version === masterBlacklistVersion;

        var bad = [];
        if (!rulesOk) bad.push('规则');
        if (!whiteOk) bad.push('白名单');
        if (!blackOk) bad.push('黑名单');

        if (bad.length === 0) {
          return '<div class="state-stack"><div class="main">版本一致</div><div class="sub">已对齐主节点</div></div>';
        }
        return '<div class="state-stack"><div class="main">版本不一致</div><div class="sub">' + bad.join(' / ') + ' 未对齐</div></div>';
      }

      function syncSummaryHtml(row) {
        if (row.node_role === 'master') {
          return '<div class="state-stack"><div class="main">规则 / 白 / 黑</div><div class="sub">主节点本地状态</div></div>';
        }
        var failed = [];
        var pending = [];
        if (row.rules_sync_status === 'failed') failed.push('规则');
        else if (row.rules_sync_status !== 'ok') pending.push('规则');
        if (row.whitelist_sync_status === 'failed') failed.push('白名单');
        else if (row.whitelist_sync_status !== 'ok') pending.push('白名单');
        if (row.blacklist_sync_status === 'failed') failed.push('黑名单');
        else if (row.blacklist_sync_status !== 'ok') pending.push('黑名单');

        if (failed.length > 0) {
          return '<div class="state-stack"><div class="main">同步失败</div><div class="sub">' + failed.join(' / ') + ' 失败</div></div>';
        }
        if (pending.length > 0) {
          return '<div class="state-stack"><div class="main">等待同步</div><div class="sub">' + pending.join(' / ') + ' 未完成</div></div>';
        }
        return '<div class="state-stack"><div class="main">同步正常</div><div class="sub">规则 / 白名单 / 黑名单</div></div>';
      }

      function detailHtml(row) {
        return '' +
          '<div class="detail-grid">' +
            '<div class="detail-card">' +
              '<h4>基础信息</h4>' +
              '<div class="detail-item"><span>节点 IP</span><strong>' + (row.ip || '-') + '</strong></div>' +
              '<div class="detail-item"><span>主机名</span><strong>' + (row.hostname || '-') + '</strong></div>' +
              '<div class="detail-item"><span>角色</span><strong>' + (row.node_role || '-') + '</strong></div>' +
              '<div class="detail-item"><span>最后上报</span><strong>' + (row.last_seen || '-') + '</strong></div>' +
            '</div>' +
            '<div class="detail-card">' +
              '<h4>版本信息</h4>' +
              '<div class="detail-item"><span>规则版本</span><strong>' + (row.rules_version || 'unknown') + '</strong></div>' +
              '<div class="detail-item"><span>白名单版本</span><strong>' + (row.whitelist_version || 'unknown') + '</strong></div>' +
              '<div class="detail-item"><span>黑名单版本</span><strong>' + (row.blacklist_version || 'unknown') + '</strong></div>' +
              '<div class="detail-item"><span>规则发布时间</span><strong>' + formatRulePublishTime(row.rules_version) + '</strong></div>' +
            '</div>' +
            '<div class="detail-card">' +
              '<h4>同步状态</h4>' +
              '<div class="detail-item"><span>综合状态</span><strong>' + $('<div>').html(syncStateHtml(row)).text() + '</strong></div>' +
              '<div class="detail-item"><span>最近同步结果</span><strong>' + statusText(row.last_sync_status) + '</strong></div>' +
              '<div class="detail-item"><span>最近同步时间</span><strong>' + (row.last_sync_at || '-') + '</strong></div>' +
            '</div>' +
            '<div class="detail-card">' +
              '<h4>分项同步</h4>' +
              '<div class="detail-item"><span>规则</span><strong>' + statusText(row.rules_sync_status) + ' / ' + (row.rules_sync_at || '-') + '</strong></div>' +
              '<div class="detail-item"><span>白名单</span><strong>' + statusText(row.whitelist_sync_status) + ' / ' + (row.whitelist_sync_at || '-') + '</strong></div>' +
              '<div class="detail-item"><span>黑名单</span><strong>' + statusText(row.blacklist_sync_status) + ' / ' + (row.blacklist_sync_at || '-') + '</strong></div>' +
            '</div>' +
          '</div>';
      }

      var tableIns = table.render({
        id: 'id-table-nodes',
        elem: '#id-table-nodes',
        url: '/clusternode/list',
        cellMinWidth: 88,
        parseData: function (res) {
          masterRulesVersion = res.master_rules_version || 'unknown';
          masterWhitelistVersion = res.master_whitelist_version || 'unknown';
          masterBlacklistVersion = res.master_blacklist_version || 'unknown';
          var rows = res.data || [];
          for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            if (row.node_role === 'master') {
              row.sync_state = 'master';
            } else {
              var rulesOk = row.rules_version && row.rules_version !== 'unknown'
                && masterRulesVersion !== 'unknown' && row.rules_version === masterRulesVersion;
              var whiteOk = row.whitelist_version && row.whitelist_version !== 'unknown'
                && masterWhitelistVersion !== 'unknown' && row.whitelist_version === masterWhitelistVersion;
              var blackOk = row.blacklist_version && row.blacklist_version !== 'unknown'
                && masterBlacklistVersion !== 'unknown' && row.blacklist_version === masterBlacklistVersion;
              var rulesSyncOk = row.rules_sync_status === 'ok';
              var whiteSyncOk = row.whitelist_sync_status === 'ok';
              var blackSyncOk = row.blacklist_sync_status === 'ok';
              row.sync_state = (rulesOk && whiteOk && blackOk && rulesSyncOk && whiteSyncOk && blackSyncOk) ? 'ok' : 'lagging';
            }
          }
          return res;
        },
        cols: [[
          {
            field: 'ip',
            title: '节点',
            minWidth: 180,
            templet: function (d) {
              return '' +
                '<div class="node-meta">' +
                  '<div class="main">' + (d.ip || '-') + '</div>' +
                  '<div class="sub">' + (d.hostname || '-') + '</div>' +
                '</div>';
            }
          },
          {
            field: 'node_role',
            title: '角色',
            width: 88,
            templet: function (d) {
              if (d.node_role === 'master') {
                return '<span class="node-pill master">master</span>';
              }
              return '<span class="node-pill">node</span>';
            }
          },
          {
            title: '同步状态',
            width: 108,
            templet: function (d) {
              return syncStateHtml(d);
            }
          },
          {
            title: '版本状态',
            minWidth: 156,
            templet: function (d) {
              return versionStateHtml(d);
            }
          },
          {
            title: '同步摘要',
            minWidth: 156,
            templet: function (d) {
              return syncSummaryHtml(d);
            }
          },
          {
            field: 'last_seen',
            title: '最后上报',
            minWidth: 156,
            templet: function (d) {
              return '' +
                '<div class="state-stack">' +
                  '<div class="main">' + timeAgo(d.last_seen) + '</div>' +
                  '<div class="sub">' + (d.last_seen || '-') + '</div>' +
                '</div>';
            }
          },
          {
            title: '操作',
            align: 'center',
            width: 132,
            templet: function (d) {
              var html = '<button class="layui-btn layui-btn-primary layui-btn-xs btn-detail" data-ip="' + d.ip + '">详情</button>';
              if (Number(d.is_online) === 0) {
                html += ' <button class="layui-btn layui-btn-danger layui-btn-xs btn-del" data-ip="' + d.ip + '">删除</button>';
              }
              return html;
            }
          }
        ]],
        page: true,
        limits: [10, 20, 50, 100],
        limit: 10,
        done: function (res, curr, count) {
          res.data.forEach(function (row, index) {
            if (Number(row.is_online) === 0) {
              $('tr[data-index=' + index + ']').addClass('offline-row');
            }
          });
        }
      });

      $.getJSON("/clusternode/stat", function (res) {
        if (res.code === 0) {
          $("#stat-total").text(res.data.total);
          $("#stat-online").text(res.data.online);
          $("#stat-offline").text(res.data.offline);
        } else {
          console.error("获取统计失败：", res.msg || "未知错误");
        }
      });

      $('#btn-show-all').on('click', function () {
        tableIns.reload({ where: {}, page: { curr: 1 } });
      });

      $('#btn-show-offline').on('click', function () {
        tableIns.reload({ where: { offline: 1 }, page: { curr: 1 } });
      });

      $(document).on('click', '.btn-detail', function () {
        var ip = $(this).data('ip');
        var cache = table.cache['id-table-nodes'] || [];
        var row = null;
        for (var i = 0; i < cache.length; i++) {
          if (cache[i].ip === ip) {
            row = cache[i];
            break;
          }
        }
        if (!row) {
          layer.msg('未找到节点详情');
          return;
        }
        layer.open({
          type: 1,
          title: '节点详情 · ' + ip,
          area: ['760px', '520px'],
          shadeClose: true,
          content: '<div style="padding:16px 18px;background:#f8fafc;min-height:100%;">' + detailHtml(row) + '</div>'
        });
      });

      // 删除按钮事件
      $(document).on('click', '.btn-del', function () {
        var ip = $(this).data('ip');
        layer.confirm('确认删除离线节点 ' + ip + '？', { icon: 3, title: '提示' }, function (index) {
          $.ajax({
            url: '/clusternode/delete',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ ip: ip }),
            success: function (res) {
              if (res.code === 0) {
                layer.msg('删除成功');
                table.reload('id-table-nodes');
              } else {
                layer.alert('删除失败：' + (res.msg || '未知错误'), { icon: 2 });
              }
            },
            error: function () {
              layer.alert('请求失败，请稍后重试', { icon: 2 });
            }
          });
          layer.close(index);
        });
      });
    });
  </script>
</body>
</html>
