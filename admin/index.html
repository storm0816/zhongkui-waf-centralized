<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
		<title>主页</title>
		<!-- 依 赖 样 式 -->
		<link rel="stylesheet" href="component/pear/css/pear.css" />
		<!-- 加 载 样 式 -->
		<link rel="stylesheet" href="admin/css/loader.css" />
		<!-- 布 局 样 式 -->
		<link rel="stylesheet" href="admin/css/admin.css" />
		<style>
			.version-info {
				position: sticky;
				bottom: 0;
				left: 0;
				width: 100%;
				z-index: 990;
				text-align: center;
				height: 44px;
				line-height: 44px;
				padding: 0;
				box-sizing: border-box;
				border-top: 1px solid rgba(255,255,255,.08);
				font-size: 13.6px;
			}

			.light-theme .version-info,.light-theme .version-info a {background-color: white ; color: #2f363c;}
			.light-theme .version-info a:hover {color: #000;}

			.dark-theme .version-info,.dark-theme .version-info a {background-color: #28333E; color: #eeeeee;}
			.dark-theme .version-info a:hover {color: #fff;}

			/* 侧栏滚动可见区优化：防止展开二级后底部菜单被版本区遮挡 */
			.pear-admin .layui-side-scroll {
				overflow-y: auto !important;
				overflow-x: hidden !important;
				width: 230px !important;
				padding-bottom: 72px;
				box-sizing: border-box;
			}
			#sideMenu {
				padding-bottom: 12px;
			}

			/* 一二级菜单层级优化（仅覆盖，不改原框架结构） */
			#sideMenu .pear-nav-tree .layui-nav-item > a {
				display: flex;
				align-items: center;
				gap: 10px;
				height: 52px;
				line-height: 52px;
				padding: 0 16px;
				font-size: 14px;
				font-weight: 600;
				letter-spacing: 0.3px;
				transition: background-color .2s ease, color .2s ease;
			}
			#sideMenu .pear-nav-tree .layui-nav-item > a > span {
				flex: 1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			#sideMenu .pear-nav-tree .layui-nav-item > a > i {
				width: 16px;
				text-align: center;
				opacity: .9;
			}
			#sideMenu .pear-nav-tree .layui-nav-itemed > a {
				background: linear-gradient(90deg, rgba(95,184,120,.22), rgba(95,184,120,.06));
			}
			#sideMenu .pear-nav-tree .layui-nav-item > a:hover {
				background-color: rgba(255, 255, 255, .08);
			}

			#sideMenu .pear-nav-tree .layui-nav-child {
				padding: 6px 0 8px 0;
				overflow: hidden;
			}
			#sideMenu .pear-nav-tree .layui-nav-child > dd {
				margin: 0;
			}
			#sideMenu .pear-nav-tree .layui-nav-child > dd > a {
				display: flex;
				align-items: center;
				height: 42px;
				line-height: 42px;
				padding: 0 14px 0 42px;
				font-size: 13px;
				font-weight: 500;
				opacity: .95;
				border-left: 2px solid transparent;
				transition: all .18s ease;
			}
			#sideMenu .pear-nav-tree .layui-nav-child > dd > a > span {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			#sideMenu .pear-nav-tree .layui-nav-child > dd > a:hover {
				background: rgba(95, 184, 120, .14);
				border-left-color: rgba(95, 184, 120, .75);
			}
			#sideMenu .pear-nav-tree .layui-nav-child > dd.layui-this > a {
				background: rgba(95, 184, 120, .22) !important;
				border-left-color: #5FB878;
			}
			#sideMenu .pear-nav-tree .layui-nav-child > dd > a > i {
				display: inline-block !important;
				width: 16px;
				margin-right: 8px;
				text-align: center;
				opacity: .9;
			}
			#sideMenu .pear-nav-tree .layui-nav-child dd a span {
				margin-left: 0 !important;
			}

			/* mini 模式只显示图标时更紧凑，减少抖动感 */
			.pear-mini #sideMenu .pear-nav-tree .layui-nav-item > a {
				padding-left: 21px;
				padding-right: 21px;
			}
			.pear-mini #sideMenu .pear-nav-tree .layui-nav-item > a > i {
				margin-right: 0;
			}
			.pear-mini .version-info {
				display: none;
			}
		</style>
	</head>
	<!-- 结 构 代 码 -->
	<body class="layui-layout-body pear-admin">
		<!-- 布 局 框 架 -->
		<div class="layui-layout layui-layout-admin">
			<!-- 顶 部 样 式 -->
			<div class="layui-header">
				<!-- 菜 单 顶 部 -->
				<div class="layui-logo">
					<!-- 图 标 -->
					<img class="logo">
					<!-- 标 题 -->
					<span class="title"></span>
				</div>
				<!-- 顶 部 左 侧 功 能 -->
				<ul class="layui-nav layui-layout-left">
					<li class="collapse layui-nav-item"><a href="#" class="layui-icon layui-icon-shrink-right"></a></li>
					<li class="refresh layui-nav-item"><a href="#" class="layui-icon layui-icon-refresh-1" loading = 600></a></li>
				</ul>
				<!-- 多 系 统 菜 单 -->
				<div id="control" class="layui-layout-control"></div>
				<!-- 顶 部 右 侧 菜 单 -->
				<ul class="layui-nav layui-layout-right">
					<li class="layui-nav-item layui-hide-xs"><a href="#" class="menuSearch layui-icon layui-icon-search"></a></li>
					<li class="layui-nav-item layui-hide-xs"><a href="#" class="fullScreen layui-icon layui-icon-screen-full"></a></li>
					<li class="layui-nav-item layui-hide-xs message"></li>
					<li class="layui-nav-item user">
						<!-- 头 像 -->
						<a class="layui-icon layui-icon-username" href="javascript:;"></a>
						<!-- 功 能 菜 单 -->
						<dl class="layui-nav-child">
							<dd><a href="javascript:void(0);" class="logout">退出登录</a></dd>
						</dl>
					</li>
					<!-- 主 题 配 置 -->
					<li class="layui-nav-item setting"><a href="#" class="layui-icon layui-icon-more-vertical"></a></li>
				</ul>
			</div>
			<!-- 侧 边 区 域 -->
			<div class="layui-side layui-bg-black">
				<!-- 菜 单 顶 部 -->
				<div class="layui-logo">
					<!-- 图 标 -->
					<img class="logo">
					<!-- 标 题 -->
					<span class="title"></span>
				</div>
				<!-- 菜 单 内 容 -->
				<div class="layui-side-scroll">
					<div id="sideMenu"></div>
					<div class="version-info">Version 1.4.0</div>
				</div>
			</div>
			<!-- 视 图 页 面 -->
			<div class="layui-body">
				<!-- 内 容 页 面 -->
				<div id="content"></div>
			</div>
			<!-- 页脚 -->
			<div class="layui-footer layui-text">
				<span class="left">
					DZH WAF
				</span>
				<span class="center"></span>
				<span class="right">
					Copyright © 2023 DZH
				</span>
			</div>
			<!-- 遮 盖 层 -->
			<div class="pear-cover"></div>
			<!-- 加 载 动 画 -->
			<div class="loader-main">
				<!-- 动 画 对 象 -->
				<div class="loader"></div>
			</div>
		</div>
		<!-- 移 动 端 便 捷 操 作 -->
		<div class="pear-collapsed-pe collapse">
			<a href="#" class="layui-icon layui-icon-shrink-right"></a>
		</div>
		<!-- 依 赖 脚 本 -->
		<script src="component/layui/layui.js"></script>
		<script src="component/pear/pear.js"></script>
		<!-- 框 架 初 始 化 -->
		<script>
			layui.use(['admin','jquery','popup'], function() {
				var $ = layui.jquery;
				var admin = layui.admin;
				var popup = layui.popup;
				
				admin.setConfigType("yml");
				admin.setConfigPath("config/pear.config.yml");
				
				admin.render();

				// 避免连续快速点击一级菜单时出现二次收缩抖动
				(function bindMenuToggleDebounce() {
					var minGap = 220;
					$("#sideMenu").on("click", ".layui-nav-tree .layui-nav-item > a[menu-type='0']", function(e) {
						var now = Date.now();
						var last = Number($(this).data("lastClickTs") || 0);
						if (now - last < minGap) {
							e.preventDefault();
							e.stopImmediatePropagation();
							return false;
						}
						$(this).data("lastClickTs", now);
					});
				})();
				
				// 登出逻辑 
				admin.logout(function(){
					$.get('/user/logout', function(data) {
						if (data && data.code == 200) {
							popup.success("退出成功",function(){
								location.href = "login.html";
							});
						} else {
							popup.failure(data.msg);
							return false;
						}
					}, "json");
					return true;
				});
			})
		</script>		
	</body>
</html>
